<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ピッキング検証</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }

  #phase-upload {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px; gap: 20px;
  }
  #phase-upload h1 { font-size: 22px; font-weight: 700; color: #38bdf8; }
  #phase-upload p { font-size: 14px; color: #94a3b8; text-align: center; }

  .upload-box {
    width: 100%; max-width: 400px; border: 2px dashed #334155;
    border-radius: 16px; padding: 32px 16px; text-align: center;
    background: #1e293b; cursor: pointer;
  }
  .upload-box .icon { font-size: 48px; margin-bottom: 12px; }
  .upload-box span { font-size: 14px; color: #94a3b8; }
  #file-input { display: none; }
  #preview-img { width: 100%; max-width: 400px; border-radius: 12px; display: none; max-height: 240px; object-fit: contain; }

  .btn-primary {
    width: 100%; max-width: 400px; padding: 16px;
    background: #0ea5e9; color: white; border: none;
    border-radius: 12px; font-size: 16px; font-weight: 600;
    cursor: pointer;
  }
  .btn-primary:active { background: #0284c7; }
  .btn-primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

  #phase-confirm { display: none; flex-direction: column; min-height: 100vh; padding: 16px; gap: 12px; }
  #phase-confirm h2 { font-size: 18px; font-weight: 700; color: #38bdf8; padding: 8px 0; }

  .item-card {
    background: #1e293b; border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .item-card .item-num {
    width: 28px; height: 28px; border-radius: 50%; background: #0ea5e9;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .item-card .item-info { flex: 1; }
  .item-card .item-name { font-size: 14px; font-weight: 600; }
  .item-card .item-jan { font-size: 11px; color: #64748b; margin-top: 2px; }
  .item-card .item-qty { font-size: 20px; font-weight: 700; color: #38bdf8; background: #0f172a; border-radius: 8px; padding: 4px 10px; }

  #phase-scan { display: none; flex-direction: column; min-height: 100vh; }

  #camera-area { position: relative; width: 100%; background: #000; flex-shrink: 0; }
  #video { width: 100%; display: block; max-height: 50vh; object-fit: cover; }
  #scan-line {
    position: absolute; left: 10%; right: 10%; height: 2px;
    background: #ef4444; box-shadow: 0 0 8px #ef4444;
    animation: scanMove 2s linear infinite; top: 30%;
  }
  @keyframes scanMove { 0% { top: 20%; } 50% { top: 70%; } 100% { top: 20%; } }

  #scan-status-bar { padding: 12px 16px; background: #1e293b; font-size: 13px; color: #94a3b8; text-align: center; border-bottom: 1px solid #334155; }

  #current-item-display { padding: 14px 16px; background: #0f172a; }
  #current-item-display .label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
  #current-item-display .target-name { font-size: 16px; font-weight: 700; }
  #current-item-display .target-jan { font-size: 12px; color: #94a3b8; }
  #current-item-display .target-qty { display: inline-block; background: #0ea5e9; color: white; border-radius: 8px; padding: 2px 10px; font-size: 14px; font-weight: 700; margin-top: 4px; }

  #voice-overlay { display: none; padding: 16px; background: #1e3a5f; border-top: 2px solid #0ea5e9; text-align: center; }
  #voice-overlay.active { display: block; }
  #voice-overlay .mic-icon { font-size: 32px; animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  #voice-overlay .voice-hint { font-size: 13px; color: #93c5fd; margin-top: 4px; }
  #voice-result { font-size: 28px; font-weight: 700; color: #38bdf8; min-height: 36px; }

  #result-flash {
    display: none; position: fixed; inset: 0;
    align-items: center; justify-content: center;
    font-size: 80px; z-index: 100;
    pointer-events: none;
  }

  #progress-area { padding: 12px 16px; background: #1e293b; }
  #progress-text { font-size: 12px; color: #64748b; margin-bottom: 6px; }
  #progress-bar-wrap { background: #334155; border-radius: 99px; height: 6px; }
  #progress-bar { height: 6px; background: #0ea5e9; border-radius: 99px; transition: width 0.3s; width: 0%; }

  #scan-list { flex: 1; overflow-y: auto; padding: 8px 16px 80px; }
  .scan-result-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #1e293b; font-size: 13px; }
  .scan-result-item .result-icon { font-size: 18px; flex-shrink: 0; }
  .scan-result-item .result-name { flex: 1; color: #e2e8f0; }
  .scan-result-item .result-detail { font-size: 11px; color: #94a3b8; }

  #phase-done { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; gap: 16px; text-align: center; }
  #phase-done .big-icon { font-size: 72px; }
  #phase-done h2 { font-size: 24px; font-weight: 700; }
  #summary { width: 100%; max-width: 400px; background: #1e293b; border-radius: 12px; padding: 16px; }
  .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; font-size: 14px; }
  .summary-row:last-child { border-bottom: none; }
  .ok-text { color: #34d399; }
  .ng-text { color: #f87171; }

  #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.9); align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 200; }
  #loading-overlay.active { display: flex; }
  .spinner { width: 48px; height: 48px; border: 4px solid #334155; border-top-color: #0ea5e9; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { font-size: 14px; color: #94a3b8; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">AIが解析中...</div>
</div>

<div id="result-flash"></div>

<!-- PHASE 1: アップロード -->
<div id="phase-upload">
  <h1>📦 ピッキング検証</h1>
  <p>ピッキングリストの写真を撮影または選択してください</p>
  <div class="upload-box" onclick="document.getElementById('file-input').click()">
    <div class="icon">📷</div>
    <span>タップして写真を選択</span>
  </div>
  <input type="file" id="file-input" accept="image/*" capture="environment">
  <img id="preview-img" alt="プレビュー">
  <button class="btn-primary" id="analyze-btn" disabled onclick="analyzeImage()">AIで読み取る</button>
</div>

<!-- PHASE 2: リスト確認 -->
<div id="phase-confirm">
  <h2>📋 ピッキングリスト確認</h2>
  <div id="item-list-display"></div>
  <button class="btn-primary" onclick="startScanning()" style="margin-top:8px;">▶ スキャン開始</button>
  <button class="btn-primary" onclick="showPhase('upload')" style="background:#1e293b; color:#94a3b8; margin-top:8px;">← 撮り直す</button>
</div>

<!-- PHASE 3: スキャン -->
<div id="phase-scan">
  <div id="camera-area">
    <video id="video" autoplay playsinline muted></video>
    <div id="scan-line"></div>
  </div>
  <div id="scan-status-bar">📷 バーコードをスキャンしてください</div>
  <div id="current-item-display">
    <div class="label">次にスキャンする商品</div>
    <div class="target-name" id="target-name">-</div>
    <div class="target-jan" id="target-jan">-</div>
    <div class="target-qty" id="target-qty">× 0</div>
  </div>
  <div id="voice-overlay">
    <div class="mic-icon">🎤</div>
    <div class="voice-hint">数量を読み上げてください</div>
    <div id="voice-result">-</div>
  </div>
  <div id="progress-area">
    <div id="progress-text">0 / 0 完了</div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  </div>
  <div id="scan-list"></div>
</div>

<!-- PHASE 4: 完了 -->
<div id="phase-done">
  <div class="big-icon">🎉</div>
  <h2>検証完了！</h2>
  <div id="summary"></div>
  <button class="btn-primary" onclick="location.reload()">最初からやり直す</button>
</div>

<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
const GEMINI_API_KEY = '%%GEMINI_API_KEY%%';

let pickingList = [];
let scanResults = [];
let currentIndex = 0;
let recognition = null;
let codeReader = null;
let scanLocked = false;

function showPhase(name) {
  ['upload','confirm','scan','done'].forEach(p => {
    document.getElementById('phase-' + p).style.display = (p === name) ? 'flex' : 'none';
  });
}

// PHASE 1
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const img = document.getElementById('preview-img');
  img.src = URL.createObjectURL(file);
  img.style.display = 'block';
  document.getElementById('analyze-btn').disabled = false;
});

async function analyzeImage() {
  const file = document.getElementById('file-input').files[0];
  if (!file) return;
  showLoading('AIが解析中...');
  const base64 = await fileToBase64(file);
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${GEMINI_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: `この画像はピッキングリスト（出荷指示書）です。画像から商品情報を読み取り、以下のJSON形式のみで返してください。コードブロック・説明文不要。\n{"items":[{"jan":"4901234567890","name":"商品名","quantity":3}]}` },
            { inline_data: { mime_type: file.type || 'image/jpeg', data: base64 } }
          ]
        }]
      })
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error.message);
    const text = json.candidates[0].content.parts[0].text;
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    hideLoading();
    if (!result.items || result.items.length === 0) {
      alert('ピッキングリストを読み取れませんでした。\n写真を撮り直してください。');
      return;
    }
    pickingList = result.items;
    renderConfirmList();
    showPhase('confirm');
  } catch(e) {
    hideLoading();
    alert('エラー: ' + e.message);
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderConfirmList() {
  document.getElementById('item-list-display').innerHTML = pickingList.map((item, i) => `
    <div class="item-card">
      <div class="item-num">${i+1}</div>
      <div class="item-info">
        <div class="item-name">${item.name || '商品名不明'}</div>
        <div class="item-jan">${item.jan || 'JANコード不明'}</div>
      </div>
      <div class="item-qty">×${item.quantity}</div>
    </div>
  `).join('');
}

// PHASE 3
async function startScanning() {
  currentIndex = 0;
  scanResults = [];
  scanLocked = false;
  showPhase('scan');
  updateProgress();
  updateCurrentTarget();
  await startCamera();
  startBarcodeReader();
  initSpeechRecognition();
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } }
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) {
    alert('カメラを起動できませんでした: ' + e.message);
  }
}

function startBarcodeReader() {
  codeReader = new ZXing.BrowserMultiFormatReader();
  const video = document.getElementById('video');
  codeReader.decodeFromVideoElementContinuously(video, (result, err) => {
    if (result && !scanLocked) onBarcodeDetected(result.getText());
  });
}

function onBarcodeDetected(code) {
  if (scanLocked || currentIndex >= pickingList.length) return;
  const target = pickingList[currentIndex];
  if (target.jan && target.jan !== code) {
    playBeep('wrong');
    flashResult('⚠️');
    setStatusBar(`⚠️ 違う商品です！ 期待: ${target.jan}`);
    return;
  }
  scanLocked = true;
  playBeep('scan');
  flashResult('✅');
  setStatusBar('🎤 数量を読み上げてください...');
  showVoiceOverlay(true);
  startListening();
}

function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('音声認識非対応です。Chromeを使用してください。'); return; }
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onresult = function(e) {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) transcript += e.results[i][0].transcript;
    const num = extractNumber(transcript);
    document.getElementById('voice-result').textContent = transcript + (num !== null ? ` → ${num}個` : '');
    if (e.results[e.results.length-1].isFinal) onVoiceResult(num);
  };
  recognition.onerror = function(e) { if (e.error !== 'no-speech') onVoiceResult(null); };
  recognition.onend = function() {};
}

function startListening() {
  if (!recognition) return;
  document.getElementById('voice-result').textContent = '...';
  try { recognition.start(); } catch(e) {}
}

function onVoiceResult(qty) {
  showVoiceOverlay(false);
  const target = pickingList[currentIndex];
  const ok = (qty !== null && qty === target.quantity);
  scanResults.push({ jan: target.jan, name: target.name, expected: target.quantity, actual: qty, ok });
  addScanResultItem(ok, target.name, target.quantity, qty);
  if (ok) {
    playBeep('correct');
    flashResult('✅');
    currentIndex++;
    updateProgress();
    if (currentIndex >= pickingList.length) {
      setTimeout(finishScanning, 800);
    } else {
      setTimeout(() => { scanLocked = false; updateCurrentTarget(); setStatusBar('📷 バーコードをスキャンしてください'); }, 600);
    }
  } else {
    playBeep('wrong');
    flashResult('❌');
    setStatusBar(`❌ 数量違い！ 期待: ${target.quantity}個 → もう一度スキャン`);
    setTimeout(() => { scanLocked = false; setStatusBar('📷 もう一度スキャンしてください'); }, 1500);
  }
}

function extractNumber(text) {
  const map = {'零':0,'ゼロ':0,'いち':1,'一':1,'に':2,'二':2,'さん':3,'三':3,'し':4,'よん':4,'四':4,'ご':5,'五':5,'ろく':6,'六':6,'なな':7,'しち':7,'七':7,'はち':8,'八':8,'きゅう':9,'く':9,'九':9,'じゅう':10,'十':10};
  const m = text.match(/\d+/);
  if (m) return parseInt(m[0]);
  for (const [k,v] of Object.entries(map)) if (text.includes(k)) return v;
  return null;
}

function updateCurrentTarget() {
  if (currentIndex >= pickingList.length) return;
  const t = pickingList[currentIndex];
  document.getElementById('target-name').textContent = t.name || '商品名不明';
  document.getElementById('target-jan').textContent = t.jan || 'JANコード不明';
  document.getElementById('target-qty').textContent = `× ${t.quantity}`;
}

function updateProgress() {
  const total = pickingList.length;
  const done = Math.min(currentIndex, total);
  document.getElementById('progress-text').textContent = `${done} / ${total} 完了`;
  document.getElementById('progress-bar').style.width = `${(done/total)*100}%`;
}

function setStatusBar(msg) { document.getElementById('scan-status-bar').textContent = msg; }
function showVoiceOverlay(show) { document.getElementById('voice-overlay').classList.toggle('active', show); }

function addScanResultItem(ok, name, expected, actual) {
  const list = document.getElementById('scan-list');
  const div = document.createElement('div');
  div.className = 'scan-result-item';
  div.innerHTML = `<span class="result-icon">${ok?'✅':'❌'}</span><span class="result-name">${name}</span><span class="result-detail">${ok?`${expected}個 OK`:`期待:${expected} 実際:${actual??'?'}`}</span>`;
  list.prepend(div);
}

function finishScanning() {
  const video = document.getElementById('video');
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
  if (codeReader) codeReader.reset();
  const total = scanResults.length;
  const okCount = scanResults.filter(r => r.ok).length;
  document.getElementById('summary').innerHTML = `
    <div class="summary-row"><span>検証件数</span><span>${total}件</span></div>
    <div class="summary-row"><span class="ok-text">✅ 正常</span><span class="ok-text">${okCount}件</span></div>
    <div class="summary-row"><span class="ng-text">❌ 数量違い</span><span class="ng-text">${total-okCount}件</span></div>`;
  showPhase('done');
  if (total === okCount) playBeep('complete');
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(type) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  if (type === 'scan') {
    o.frequency.setValueAtTime(880, now); g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.15); o.start(now); o.stop(now+0.15);
  } else if (type === 'correct') {
    o.frequency.setValueAtTime(660, now); o.frequency.setValueAtTime(880, now+0.1); g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.3); o.start(now); o.stop(now+0.3);
  } else if (type === 'wrong') {
    o.type='sawtooth'; o.frequency.setValueAtTime(220, now); g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.4); o.start(now); o.stop(now+0.4);
  } else if (type === 'complete') {
    [523,659,784,1047].forEach((freq,i) => {
      const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
      o2.connect(g2); g2.connect(audioCtx.destination);
      const t=now+i*0.12; o2.frequency.setValueAtTime(freq,t); g2.gain.setValueAtTime(0.3,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.3); o2.start(t); o2.stop(t+0.3);
    });
  }
}

function flashResult(emoji) {
  const el = document.getElementById('result-flash');
  el.textContent = emoji; el.style.display = 'flex';
  el.style.background = emoji==='✅' ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)';
  setTimeout(() => { el.style.display = 'none'; }, 400);
}

function showLoading(msg) { document.getElementById('loading-text').textContent = msg; document.getElementById('loading-overlay').classList.add('active'); }
function hideLoading() { document.getElementById('loading-overlay').classList.remove('active'); }

showPhase('upload');
</script>
</body>
</html>
