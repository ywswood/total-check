<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ピッキング検証</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
    }

    #phase-upload {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      gap: 20px;
    }

    #phase-upload h1 {
      font-size: 22px;
      font-weight: 700;
      color: #38bdf8;
    }

    #phase-upload p {
      font-size: 14px;
      color: #94a3b8;
      text-align: center;
    }

    .upload-box {
      width: 100%;
      max-width: 400px;
      border: 2px dashed #334155;
      border-radius: 16px;
      padding: 32px 16px;
      text-align: center;
      background: #1e293b;
      cursor: pointer;
    }

    .upload-box .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-box span {
      font-size: 14px;
      color: #94a3b8;
    }

    #file-input {
      display: none;
    }

    #preview-img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      display: none;
      max-height: 240px;
      object-fit: contain;
    }

    .btn-primary {
      width: 100%;
      max-width: 400px;
      padding: 16px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary:active {
      background: #0284c7;
    }

    .btn-primary:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
    }

    .btn-danger {
      background: #ef4444;
    }

    .btn-danger:active {
      background: #dc2626;
    }

    #phase-confirm {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      padding: 16px;
      gap: 12px;
    }

    #phase-confirm h2 {
      font-size: 18px;
      font-weight: 700;
      color: #38bdf8;
      padding: 8px 0;
    }

    .item-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .item-card .item-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0ea5e9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .item-card .item-info {
      flex: 1;
    }

    .item-card .item-name {
      font-size: 14px;
      font-weight: 600;
    }

    .item-card .item-jan {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .item-card .item-qty {
      font-size: 20px;
      font-weight: 700;
      color: #38bdf8;
      background: #0f172a;
      border-radius: 8px;
      padding: 4px 10px;
    }

    #phase-scan {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    #camera-area {
      position: relative;
      width: 100%;
      background: #000;
      flex-shrink: 0;
    }

    #video {
      width: 100%;
      display: block;
      max-height: 45vh;
      object-fit: cover;
    }

    #scan-line {
      position: absolute;
      left: 10%;
      right: 10%;
      height: 2px;
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
      animation: scanMove 2s linear infinite;
      top: 30%;
    }

    @keyframes scanMove {
      0% {
        top: 20%;
      }

      50% {
        top: 70%;
      }

      100% {
        top: 20%;
      }
    }

    #scan-status-bar {
      padding: 10px 16px;
      background: #1e293b;
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    #voice-overlay {
      display: none;
      padding: 12px 16px;
      background: #1e3a5f;
      border-top: 2px solid #0ea5e9;
      text-align: center;
    }

    #voice-overlay.active {
      display: block;
    }

    #voice-overlay .mic-icon {
      font-size: 28px;
      animation: pulse 0.8s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    #voice-overlay .voice-hint {
      font-size: 12px;
      color: #93c5fd;
      margin-top: 2px;
    }

    #voice-result {
      font-size: 24px;
      font-weight: 700;
      color: #38bdf8;
      min-height: 30px;
    }

    #result-flash {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      z-index: 100;
      pointer-events: none;
    }

    #progress-area {
      padding: 10px 16px;
      background: #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #progress-text {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
    }

    #progress-bar-wrap {
      flex: 1;
      background: #334155;
      border-radius: 99px;
      height: 6px;
    }

    #progress-bar {
      height: 6px;
      background: #0ea5e9;
      border-radius: 99px;
      transition: width 0.3s;
      width: 0%;
    }

    #finish-btn {
      padding: 8px 16px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #checklist {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 20px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: #1e293b;
      transition: opacity 0.3s;
    }

    .check-item.done {
      opacity: 0.4;
      background: #0f2d1a;
    }

    .check-item .ci-icon {
      font-size: 18px;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }

    .check-item .ci-info {
      flex: 1;
    }

    .check-item .ci-name {
      font-size: 13px;
      font-weight: 600;
    }

    .check-item .ci-jan {
      font-size: 10px;
      color: #64748b;
    }

    .check-item .ci-qty {
      font-size: 16px;
      font-weight: 700;
      color: #38bdf8;
    }

    .check-item.done .ci-qty {
      color: #34d399;
    }

    #phase-done {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      gap: 16px;
      text-align: center;
    }

    #phase-done .big-icon {
      font-size: 72px;
    }

    #phase-done h2 {
      font-size: 24px;
      font-weight: 700;
    }

    #summary {
      width: 100%;
      max-width: 400px;
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #334155;
      font-size: 14px;
    }

    .summary-row:last-child {
      border-bottom: none;
    }

    .ok-text {
      color: #34d399;
    }

    .ng-text {
      color: #f87171;
    }

    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.9);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 200;
    }

    #loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #334155;
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-text {
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">AIが解析中...</div>
  </div>
  <div id="result-flash"></div>

  <!-- PHASE 1 -->
  <div id="phase-upload">
    <h1>📦 ピッキング検証</h1>
    <p>ピッキングリストの写真を撮影または選択してください</p>
    <div class="upload-box" onclick="document.getElementById('file-input').click()">
      <div class="icon">📷</div>
      <span>タップして写真を選択</span>
    </div>
    <input type="file" id="file-input" accept="image/*" capture="environment">
    <img id="preview-img" alt="プレビュー">
    <button class="btn-primary" id="analyze-btn" disabled onclick="analyzeImage()">AIで読み取る</button>
  </div>

  <!-- PHASE 2 -->
  <div id="phase-confirm">
    <h2>📋 ピッキングリスト確認</h2>
    <div id="item-list-display"></div>
    <button class="btn-primary" onclick="startScanning()" style="margin-top:8px;">▶ スキャン開始</button>
    <button class="btn-primary" onclick="showPhase('upload')" style="background:#1e293b;color:#94a3b8;margin-top:8px;">←
      撮り直す</button>
  </div>

  <!-- PHASE 3 -->
  <div id="phase-scan">
    <div id="camera-area">
      <video id="video" autoplay playsinline muted></video>
      <div id="scan-line"></div>
    </div>
    <div id="scan-status-bar">📷 バーコードをスキャンしてください</div>
    <div id="voice-overlay">
      <div class="mic-icon">🎤</div>
      <div class="voice-hint">数量を読み上げてください</div>
      <div id="voice-result">...</div>
    </div>
    <div id="progress-area">
      <div id="progress-text">0 / 0 完了</div>
      <div id="progress-bar-wrap">
        <div id="progress-bar"></div>
      </div>
      <button id="finish-btn" onclick="finishScanning()">終了</button>
    </div>
    <div id="checklist"></div>
  </div>

  <!-- PHASE 4 -->
  <div id="phase-done">
    <div class="big-icon" id="done-icon">🎉</div>
    <h2 id="done-title">検証完了！</h2>
    <div id="summary"></div>
    <button class="btn-primary" onclick="location.reload()">最初からやり直す</button>
  </div>

  <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script>
    const GEMINI_API_KEY = '%%GEMINI_API_KEY%%';

    // pickingList: [{jan, name, quantity, done}]
    let pickingList = [];
    let recognition = null;
    let codeReader = null;
    let scanLocked = false;
    let currentScanItem = null; // 今音声入力中のアイテム

    function showPhase(name) {
      ['upload', 'confirm', 'scan', 'done'].forEach(p => {
        document.getElementById('phase-' + p).style.display = (p === name) ? 'flex' : 'none';
      });
    }

    // ===== PHASE 1 =====
    document.getElementById('file-input').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const img = document.getElementById('preview-img');
      img.src = URL.createObjectURL(file);
      img.style.display = 'block';
      document.getElementById('analyze-btn').disabled = false;
    });

    async function analyzeImage() {
      const file = document.getElementById('file-input').files[0];
      if (!file) return;
      showLoading('AIが解析中...');
      const base64 = await fileToBase64(file);
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                { text: `この画像はピッキングリスト（出荷指示書）です。画像から全商品情報を読み取り、以下のJSON形式のみで返してください。コードブロック・説明文は不要です。\n{"items":[{"productCode":"082713","jan":"4547855325958","name":"商品名","quantity":1}]}\n\n抽出ルール：\n- productCode: 商品番号（6桁の数字。リスト内の[082713]のような角括弧内の番号）\n- jan: JANコード（13桁の数字。バーコード下の数字列）\n- name: 商品名\n- quantity: 出荷指示数（数値）\n読み取れない場合：productCodeは空文字、janは空文字、quantityは1にしてください。` },
                { inline_data: { mime_type: file.type || 'image/jpeg', data: base64 } }
              ]
            }]
          })
        });
        const json = await res.json();
        if (json.error) throw new Error(json.error.message);
        const text = json.candidates[0].content.parts[0].text;
        const result = JSON.parse(text.replace(/```json|```/g, '').trim());
        hideLoading();
        if (!result.items || result.items.length === 0) { alert('読み取れませんでした。撮り直してください。'); return; }
        pickingList = result.items.map(item => ({ productCode: item.productCode || '', jan: item.jan || '', name: item.name || '', quantity: item.quantity || 1, done: false }));
        renderConfirmList();
        showPhase('confirm');
      } catch (e) { hideLoading(); alert('エラー: ' + e.message); }
    }

    function fileToBase64(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
    }

    function renderConfirmList() {
      document.getElementById('item-list-display').innerHTML = pickingList.map((item, i) => `
    <div class="item-card">
      <div class="item-num">${i + 1}</div>
      <div class="item-info">
        <div class="item-name">${item.name || '商品名不明'}</div>
        <div class="item-jan">${item.productCode ? '商品: ' + item.productCode + '　' : ''}${item.jan || 'JANコード不明'}</div>
      </div>
      <div class="item-qty">×${item.quantity}</div>
    </div>`).join('');
    }

    // ===== PHASE 3 =====
    async function startScanning() {
      scanLocked = false;
      currentScanItem = null;
      showPhase('scan');
      renderChecklist();
      updateProgress();
      await startCamera();
      startBarcodeReader();
      initSpeechRecognition();
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
        document.getElementById('video').srcObject = stream;
      } catch (e) { alert('カメラ起動エラー: ' + e.message); }
    }

    function startBarcodeReader() {
      codeReader = new ZXing.BrowserMultiFormatReader();
      codeReader.decodeFromVideoElementContinuously(document.getElementById('video'), (result, err) => {
        if (result && !scanLocked) onBarcodeDetected(result.getText());
      });
    }

    function onBarcodeDetected(code) {
      if (scanLocked) return;

      // リストから未消込のJAN or 商品番号を検索
      const item = pickingList.find(it => !it.done && (it.jan === code || it.productCode === code));

      if (!item) {
        // リストにないor消込済み
        const alreadyDone = pickingList.find(it => it.done && (it.jan === code || it.productCode === code));
        if (alreadyDone) {
          playBeep('wrong');
          setStatusBar('⚠️ 消込済みです: ' + alreadyDone.name);
        } else {
          playBeep('wrong');
          setStatusBar('❌ リストにない商品です: ' + code);
        }
        return;
      }

      // 一致した → ロックして音声待機
      scanLocked = true;
      currentScanItem = item;
      playBeep('scan');
      setStatusBar('🎤 数量を読み上げてください: ' + item.name + ' (期待: ' + item.quantity + '個)');
      showVoiceOverlay(true);
      startListening();  // バーコード読取後に音声認識を起動
    }

    function initSpeechRecognition() {
      // 初期化のみ。SpeechRecognition の利用可否チェック
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('音声認識非対応です。'); }
      // インスタンスはstartListeningで毎回生成する
    }

    function startListening() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return;

      // 前回のインスタンスが残っていれば停止してから破棄
      if (recognition) {
        try { recognition.abort(); } catch (e) { }
        recognition = null;
      }

      // 毎回新規作成することで「すでに起動中」エラーを回避
      recognition = new SR();
      recognition.lang = 'ja-JP';
      recognition.continuous = false;
      recognition.interimResults = true;

      recognition.onresult = function (e) {
        let transcript = '';
        for (let i = e.resultIndex; i < e.results.length; i++) transcript += e.results[i][0].transcript;
        const num = extractNumber(transcript);
        document.getElementById('voice-result').textContent = transcript + (num !== null ? ' → ' + num + '個' : '');
        if (e.results[e.results.length - 1].isFinal) onVoiceResult(num);
      };
      recognition.onerror = function (e) {
        if (e.error !== 'no-speech') onVoiceResult(null);
      };

      document.getElementById('voice-result').textContent = '...';
      try { recognition.start(); } catch (e) { console.warn('recognition.start error:', e); }
    }

    function onVoiceResult(qty) {
      showVoiceOverlay(false);
      const item = currentScanItem;
      if (!item) return;

      if (qty !== null && qty === item.quantity) {
        // 正解 → 消込
        item.done = true;
        playBeep('correct');
        flashResult('✅');
        setStatusBar('✅ ' + item.name + ' 消込完了！');
        renderChecklist();
        updateProgress();

        const doneCount = pickingList.filter(it => it.done).length;
        if (doneCount === pickingList.length) {
          setTimeout(finishScanning, 800);
        } else {
          setTimeout(() => {
            scanLocked = false;
            currentScanItem = null;
            setStatusBar('📷 バーコードをスキャンしてください');
          }, 600);
        }
      } else {
        // 不正解
        playBeep('wrong');
        flashResult('❌');
        setStatusBar('❌ 数量違い！ 期待: ' + item.quantity + '個 → もう一度スキャン');
        setTimeout(() => {
          scanLocked = false;
          currentScanItem = null;
          setStatusBar('📷 バーコードをスキャンしてください');
        }, 1500);
      }
    }

    function renderChecklist() {
      document.getElementById('checklist').innerHTML = pickingList.map(item => `
    <div class="check-item ${item.done ? 'done' : ''}">
      <div class="ci-icon">${item.done ? '✅' : '⬜'}</div>
      <div class="ci-info">
        <div class="ci-name">${item.name || '商品名不明'}</div>
        <div class="ci-jan">${item.productCode ? item.productCode + '　' : ''}${item.jan || ''}</div>
      </div>
      <div class="ci-qty">${item.done ? '済' : '×' + item.quantity}</div>
    </div>`).join('');
    }

    function updateProgress() {
      const total = pickingList.length;
      const done = pickingList.filter(it => it.done).length;
      document.getElementById('progress-text').textContent = done + ' / ' + total + ' 完了';
      document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
    }

    function setStatusBar(msg) { document.getElementById('scan-status-bar').textContent = msg; }
    function showVoiceOverlay(show) { document.getElementById('voice-overlay').classList.toggle('active', show); }

    function finishScanning() {
      const video = document.getElementById('video');
      if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
      if (codeReader) codeReader.reset();

      const total = pickingList.length;
      const done = pickingList.filter(it => it.done).length;
      const undone = total - done;

      document.getElementById('done-icon').textContent = undone === 0 ? '🎉' : '⚠️';
      document.getElementById('done-title').textContent = undone === 0 ? '全件完了！' : '検証終了';

      let summaryHTML = `
    <div class="summary-row"><span>総件数</span><span>${total}件</span></div>
    <div class="summary-row"><span class="ok-text">✅ 消込済み</span><span class="ok-text">${done}件</span></div>
    <div class="summary-row"><span class="ng-text">⬜ 未処理</span><span class="ng-text">${undone}件</span></div>`;

      if (undone > 0) {
        const undoneItems = pickingList.filter(it => !it.done);
        summaryHTML += undoneItems.map(it =>
          `<div class="summary-row"><span class="ng-text" style="font-size:12px;">　${it.name}</span><span class="ng-text" style="font-size:12px;">×${it.quantity}</span></div>`
        ).join('');
      }

      document.getElementById('summary').innerHTML = summaryHTML;
      showPhase('done');
      if (undone === 0) playBeep('complete');
    }

    function extractNumber(text) {
      const map = { '零': 0, 'ゼロ': 0, 'いち': 1, '一': 1, 'に': 2, '二': 2, 'さん': 3, '三': 3, 'し': 4, 'よん': 4, '四': 4, 'ご': 5, '五': 5, 'ろく': 6, '六': 6, 'なな': 7, 'しち': 7, '七': 7, 'はち': 8, '八': 8, 'きゅう': 9, 'く': 9, '九': 9, 'じゅう': 10, '十': 10 };
      const m = text.match(/\d+/);
      if (m) return parseInt(m[0]);
      for (const [k, v] of Object.entries(map)) if (text.includes(k)) return v;
      return null;
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(type) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      if (type === 'scan') {
        o.frequency.setValueAtTime(880, now); g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15); o.start(now); o.stop(now + 0.15);
      } else if (type === 'correct') {
        o.frequency.setValueAtTime(660, now); o.frequency.setValueAtTime(880, now + 0.1); g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.3); o.start(now); o.stop(now + 0.3);
      } else if (type === 'wrong') {
        o.type = 'sawtooth'; o.frequency.setValueAtTime(220, now); g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.4); o.start(now); o.stop(now + 0.4);
      } else if (type === 'complete') {
        [523, 659, 784, 1047].forEach((freq, i) => {
          const o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
          o2.connect(g2); g2.connect(audioCtx.destination);
          const t = now + i * 0.12; o2.frequency.setValueAtTime(freq, t); g2.gain.setValueAtTime(0.3, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3); o2.start(t); o2.stop(t + 0.3);
        });
      }
    }

    function flashResult(emoji) {
      const el = document.getElementById('result-flash');
      el.textContent = emoji; el.style.display = 'flex';
      el.style.background = emoji === '✅' ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)';
      setTimeout(() => { el.style.display = 'none'; }, 400);
    }

    function showLoading(msg) { document.getElementById('loading-text').textContent = msg; document.getElementById('loading-overlay').classList.add('active'); }
    function hideLoading() { document.getElementById('loading-overlay').classList.remove('active'); }

    showPhase('upload');
  </script>
</body>
